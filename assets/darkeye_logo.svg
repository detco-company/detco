<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Beautiful abstract highway-inspired Dark-Eye symbol -->
  <g transform="translate(5, 5)">
    <!-- Eye outer outline / protective shield -->
    <path d="M10 25 C 22 10, 42 10, 54 25 C 42 40, 22 40, 10 25 Z" fill="none" stroke="#DC2626" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Reflective pupil / highway lane lines perspective inside eye -->
    <path d="M32 25 L 32 37 M 26 25 L 20 35 M 38 25 L 44 35" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="32" cy="22" r="7.5" fill="#0F172A"/>
    <circle cx="35" cy="19" r="2.5" fill="#FFFFFF"/>
    
    <!-- Premium Typography -->
    <text x="68" y="24" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="20" font-weight="800" fill="#0F172A" letter-spacing="-0.5">DARK-EYE</text>
    <text x="68" y="38" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#64748B" letter-spacing="1">SAFETY INDIA</text>
  </g>
</svg>
